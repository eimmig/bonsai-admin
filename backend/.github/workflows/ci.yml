name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build-and-test:
    name: Build, Test & Coverage (>= 80%)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: maven

      - name: Garantir permissão de execução do mvnw
        run: chmod +x ./mvnw

      # Combinado: roda testes + JaCoCo check em uma única invocação Maven
      - name: Build, testes e validação de cobertura (JaCoCo >= 80%)
        run: ./mvnw -B -ntp verify

      # Publica resultados de teste no PR como anotações de linha
      - name: Publicar resultados dos testes (JUnit)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Publicar relatório de cobertura (JaCoCo)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          if-no-files-found: warn

  security-scan:
    name: Scan de Vulnerabilidades (OWASP)
    runs-on: ubuntu-latest
    # Roda em paralelo com build-and-test para não bloquear o pipeline
    needs: []

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: maven

      - name: Garantir permissão de execução do mvnw
        run: chmod +x ./mvnw

      - name: OWASP Dependency Check
        run: >
          ./mvnw -B -ntp
          org.owasp:dependency-check-maven:check
          -DfailBuildOnCVSS=7
          -DsuppressionFile=.github/owasp-suppressions.xml
        continue-on-error: false

      - name: Publicar relatório OWASP
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: target/dependency-check-report.html
          if-no-files-found: warn

  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: maven

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Garantir permissão de execução do mvnw
        run: chmod +x ./mvnw

      - name: Build para CodeQL
        run: ./mvnw -B -ntp compile -DskipTests

      - name: Executar análise CodeQL
        uses: github/codeql-action/analyze@v3