spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5431/pw45s}
    username: ${DB_USERNAME:pw45s}
    password: ${DB_PASSWORD:pw45s}
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

security:
  jwt:
    secret: ${JWT_SECRET}
    issuer: pw45s
    expiration-minutes: 60

minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:pw45s}

logging:
  logstash:
    host: localhost
    port: 5044

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true